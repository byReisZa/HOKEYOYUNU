<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Araba Simülatörü</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-left">
      <div class="hud-label">HIZ</div>
      <div id="speed-display">0</div>
      <div class="hud-unit">km/h</div>
    </div>
    <div id="hud-center">
      <div class="hud-label">VİTES</div>
      <div id="gear-display">N</div>
      <div id="gear-bar">
        <span class="g-btn" data-g="0">N</span>
        <span class="g-btn" data-g="1">1</span>
        <span class="g-btn" data-g="2">2</span>
        <span class="g-btn" data-g="3">3</span>
        <span class="g-btn" data-g="4">4</span>
        <span class="g-btn" data-g="5">5</span>
      </div>
    </div>
    <div id="hud-right">
      <div class="hud-label">RPM</div>
      <div id="rpm-display">0</div>
      <div class="hud-unit">×100</div>
    </div>
  </div>

  <!-- RPM Göstergesi -->
  <div id="rpm-gauge-wrap">
    <canvas id="rpm-gauge" width="160" height="160"></canvas>
  </div>

  <!-- Hız Göstergesi -->
  <div id="speed-gauge-wrap">
    <canvas id="speed-gauge" width="160" height="160"></canvas>
  </div>

  <!-- Oyun Canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Kontroller -->
  <div id="controls-hint">
    <span>↑ Gaz</span>
    <span>↓ Fren</span>
    <span>← → Direksiyon</span>
    <span>W/S Vites</span>
    <span>SPACE El Freni</span>
  </div>

  <!-- Mesafe -->
  <div id="distance-wrap">
    <div class="hud-label">MESAFE</div>
    <div id="distance-display">0 m</div>
  </div>

  <!-- Motor Sesi Göstergesi -->
  <div id="engine-bar-wrap">
    <div class="hud-label">MOTOR</div>
    <div id="engine-bar-bg">
      <div id="engine-bar-fill"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
