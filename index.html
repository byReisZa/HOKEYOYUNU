<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>UrbanDrive 3D</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <!-- ===== LOADING SCREEN ===== -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="logo-text">URBAN<span>DRIVE</span></div>
      <div class="loading-bar-wrap">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-label" id="loading-label">Yükleniyor... 0%</div>
    </div>
  </div>

  <!-- ===== MAIN MENU ===== -->
  <div id="main-menu" class="hidden">
    <div class="menu-bg"></div>
    <div class="menu-content">
      <div class="menu-logo">URBAN<span>DRIVE</span></div>
      <div class="menu-subtitle">Gerçekçi 3D Şehir Sürüş Simülasyonu</div>
      <div class="menu-buttons">
        <button class="menu-btn primary" id="btn-play">OYNA</button>
        <button class="menu-btn" id="btn-settings">AYARLAR</button>
      </div>
      <div class="menu-controls">
        <span>WASD / Ok Tuşları • Boşluk: El Freni • N: Nitro • C: Kamera • R: Reset • H: Farlar</span>
      </div>
    </div>
  </div>

  <!-- ===== SETTINGS MENU ===== -->
  <div id="settings-menu" class="hidden">
    <div class="settings-panel">
      <h2>AYARLAR</h2>
      <div class="setting-row">
        <label>Grafik Kalitesi</label>
        <div class="btn-group">
          <button class="quality-btn active" data-q="low">DÜŞÜK</button>
          <button class="quality-btn" data-q="medium">ORTA</button>
          <button class="quality-btn" data-q="high">YÜKSEK</button>
        </div>
      </div>
      <div class="setting-row">
        <label>Ses</label>
        <input type="range" id="vol-slider" min="0" max="100" value="70" />
      </div>
      <div class="setting-row">
        <label>Gölgeler</label>
        <label class="toggle"><input type="checkbox" id="shadow-toggle" checked /><span class="slider"></span></label>
      </div>
      <div class="setting-row">
        <label>Yapay Zeka Araçları</label>
        <label class="toggle"><input type="checkbox" id="ai-toggle" checked /><span class="slider"></span></label>
      </div>
      <div class="setting-row">
        <label>Mobil Performans Modu</label>
        <label class="toggle"><input type="checkbox" id="mobile-toggle" /><span class="slider"></span></label>
      </div>
      <button class="menu-btn primary" id="btn-back">GERİ</button>
    </div>
  </div>

  <!-- ===== PAUSE MENU ===== -->
  <div id="pause-menu" class="hidden">
    <div class="pause-panel">
      <h2>OYUN DURAKLATILDI</h2>
      <button class="menu-btn primary" id="btn-resume">DEVAM ET</button>
      <button class="menu-btn" id="btn-main-menu">ANA MENÜ</button>
    </div>
  </div>

  <!-- ===== GAME CANVAS ===== -->
  <canvas id="game-canvas"></canvas>

  <!-- ===== HUD ===== -->
  <div id="hud" class="hidden">
    <!-- Speedometer -->
    <div class="hud-speedometer">
      <div class="speed-value" id="speed-display">0</div>
      <div class="speed-unit">KM/H</div>
      <div class="gear-display" id="gear-display">N</div>
    </div>

    <!-- Nitro Bar -->
    <div class="nitro-container">
      <div class="nitro-label">NİTRO</div>
      <div class="nitro-bar-bg">
        <div class="nitro-bar" id="nitro-bar"></div>
      </div>
    </div>

    <!-- Top stats -->
    <div class="hud-top">
      <div class="fps-counter" id="fps-counter">60 FPS</div>
      <div class="camera-mode" id="camera-mode">DIŞ KAMERA</div>
    </div>

    <!-- Damage indicator -->
    <div class="damage-bar-wrap">
      <div class="damage-label">HASAR</div>
      <div class="damage-bg">
        <div class="damage-fill" id="damage-fill"></div>
      </div>
    </div>

    <!-- Minimap -->
    <canvas id="minimap" width="160" height="160"></canvas>
    <div class="minimap-label">HARİTA</div>

    <!-- Mission -->
    <div class="mission-box" id="mission-box">
      <div class="mission-title">GÖREV</div>
      <div class="mission-desc" id="mission-desc">Şehri Keşfet</div>
    </div>

    <!-- Light indicators -->
    <div class="light-indicators">
      <span id="light-ind" class="ind off">FAR</span>
      <span id="brake-ind" class="ind off">FREN</span>
      <span id="nitro-ind" class="ind off">NTR</span>
    </div>

    <!-- Mobile controls -->
    <div id="mobile-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-handle"></div>
        </div>
      </div>
      <div id="mobile-buttons">
        <button class="mob-btn" id="mob-brake">FREN</button>
        <button class="mob-btn" id="mob-nitro">NİTRO</button>
        <button class="mob-btn" id="mob-handbrake">EL FR.</button>
        <button class="mob-btn" id="mob-camera">CAM</button>
        <button class="mob-btn" id="mob-reset">RESET</button>
        <button class="mob-btn" id="mob-lights">FAR</button>
      </div>
    </div>

    <!-- Pause button -->
    <button id="pause-btn" title="Durdur">⏸</button>
  </div>

  <!-- Drift/Nitro flash overlay -->
  <div id="speed-lines" class="hidden"></div>

  <script src="game.js"></script>
</body>
</html>
