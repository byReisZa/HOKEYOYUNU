<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliza Racing 3D - İç Kamera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }

        .hud {
            position: fixed; pointer-events: none; z-index: 10;
        }

        /* Hız Göstergesi */
        .speedometer {
            bottom: 30px; right: 30px; width: 200px; height: 200px;
        }
        .gauge {
            width: 100%; height: 100%; position: relative;
        }
        .gauge-arc {
            width: 100%; height: 100%; border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.08);
            border-top-color: transparent; border-right-color: transparent;
            transform: rotate(45deg); position: absolute;
        }
        .gauge-needle {
            position: absolute; bottom: 50%; left: 50%; width: 3px; height: 85px;
            background: linear-gradient(to top, #ff3333, #ff6666);
            transform-origin: bottom center; transform: translateX(-50%) rotate(-135deg);
            border-radius: 2px; transition: transform 0.03s linear;
            box-shadow: 0 0 10px rgba(255,51,51,0.5);
        }
        .gauge-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center;
        }
        .gauge-value {
            font-size: 42px; font-weight: bold; color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .gauge-unit { font-size: 12px; color: #888; }
        .gauge-label { font-size: 10px; color: #555; margin-top: 2px; }

        /* RPM */
        .rpm-gauge {
            bottom: 30px; right: 250px; width: 140px; height: 140px;
        }
        .rpm-gauge .gauge-needle { height: 60px; }
        .rpm-gauge .gauge-value { font-size: 24px; }

        /* Vites */
        .gear-display {
            bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; padding: 12px 25px; text-align: center;
            backdrop-filter: blur(5px);
        }
        .gear-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 2px; }
        .gear-value {
            font-size: 48px; font-weight: bold; color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            transition: all 0.08s;
        }
        .gear-value.shift { color: #ff4444; transform: scale(1.15); }

        /* Direksiyon */
        .steering-wheel {
            bottom: -160px; left: 50%; transform: translateX(-50%);
            width: 360px; height: 360px;
        }
        .wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 10px solid rgba(35,35,35,0.95);
            position: relative;
            transform-origin: center; transition: transform 0.03s linear;
            box-shadow: 0 0 40px rgba(0,0,0,0.9), inset 0 0 15px rgba(0,0,0,0.5);
        }
        .wheel::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 70px; height: 70px; background: rgba(25,25,25,0.98);
            transform: translate(-50%, -50%); border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.08);
        }
        .wheel-spoke {
            position: absolute; top: 0; left: 50%; width: 16px; height: 50%;
            background: rgba(45,45,45,0.95); transform: translateX(-50%);
            transform-origin: bottom center;
        }
        .wheel-spoke:nth-child(2) { transform: translateX(-50%) rotate(120deg); }
        .wheel-spoke:nth-child(3) { transform: translateX(-50%) rotate(240deg); }

        /* Pedallar */
        .pedals {
            bottom: 15px; left: 25px; display: flex; gap: 10px;
        }
        .pedal {
            width: 50px; height: 80px; border-radius: 8px;
            background: rgba(35,35,35,0.7); border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #555; font-weight: bold;
            transition: all 0.03s;
        }
        .pedal.active {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.3);
            transform: scale(0.96);
        }
        .pedal.gas.active { background: rgba(0,200,0,0.15); border-color: rgba(0,200,0,0.4); }
        .pedal.brake.active { background: rgba(200,0,0,0.15); border-color: rgba(200,0,0,0.4); }
        .pedal.clutch.active { background: rgba(0,100,200,0.15); border-color: rgba(0,100,200,0.4); }

        /* Vites Kolu */
        .shifter {
            bottom: 30px; right: 420px; width: 70px; height: 100px;
            background: rgba(15,15,15,0.8); border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); padding: 8px;
        }
        .shifter-pattern {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 4px; height: 100%;
        }
        .gear-slot {
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #444; font-weight: bold;
            border-radius: 4px; transition: all 0.08s;
        }
        .gear-slot.active {
            background: rgba(255,255,255,0.15); color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .gear-slot.neutral { grid-column: 1 / -1; font-size: 10px; }

        /* Minimap */
        .minimap {
            top: 25px; right: 25px; width: 160px; height: 160px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; overflow: hidden;
        }

        /* FPS */
        .fps-counter {
            top: 25px; left: 25px; color: #0f0; font-size: 13px;
            font-family: monospace; background: rgba(0,0,0,0.4);
            padding: 4px 8px; border-radius: 4px;
        }

        /* Kontroller */
        .controls-info {
            top: 60px; left: 25px; color: #777; font-size: 11px;
            background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px;
            line-height: 1.7;
        }
        .controls-info span { color: #bbb; font-weight: bold; }

        /* Motor bar */
        .engine-vibe {
            bottom: 240px; right: 30px; width: 200px; height: 4px;
            background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
        }
        .engine-vibe-fill {
            height: 100%; width: 0%; background: linear-gradient(90deg, #0a0, #aa0, #a00);
            border-radius: 2px; transition: width 0.03s linear;
        }

        /* Vites uyarı */
        .shift-light {
            bottom: 255px; right: 30px; width: 200px; text-align: center;
            color: #ff3333; font-size: 12px; font-weight: bold;
            opacity: 0; transition: opacity 0.08s;
            text-shadow: 0 0 8px rgba(255,51,51,0.8);
        }
        .shift-light.show { opacity: 1; }

        /* Pozisyon */
        .position-display {
            top: 25px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 14px; background: rgba(0,0,0,0.4);
            padding: 6px 16px; border-radius: 20px;
        }

        /* Başlangıç */
        .start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.5s;
        }
        .start-screen h1 {
            font-size: 56px; color: #fff; margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(255,255,255,0.2);
            letter-spacing: 8px;
        }
        .start-screen p { color: #777; font-size: 16px; margin-bottom: 35px; }
        .start-btn {
            padding: 18px 50px; font-size: 22px; color: #fff;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 3px;
        }
        .start-btn:hover {
            background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        /* Torpido overlay */
        .dashboard-overlay {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 140px;
            background: linear-gradient(to top, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.7) 60%, transparent 100%);
            pointer-events: none; z-index: 5;
        }

        /* Yan aynalar */
        .mirror-left, .mirror-right {
            position: fixed; top: 80px; width: 120px; height: 70px;
            background: rgba(5,5,5,0.85); border: 2px solid rgba(50,50,50,0.6);
            border-radius: 8px; overflow: hidden; pointer-events: none; z-index: 6;
        }
        .mirror-left { left: 30px; }
        .mirror-right { right: 30px; }
        .mirror-label {
            position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
            font-size: 8px; color: #444;
        }
    </style>
<base target="_blank">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="dashboard-overlay"></div>

    <div class="mirror-left">
        <canvas id="mirrorLeftCanvas" width="120" height="70"></canvas>
        <div class="mirror-label">L</div>
    </div>
    <div class="mirror-right">
        <canvas id="mirrorRightCanvas" width="120" height="70"></canvas>
        <div class="mirror-label">R</div>
    </div>

    <!-- HUD -->
    <div class="hud speedometer">
        <div class="gauge">
            <div class="gauge-arc"></div>
            <div class="gauge-needle" id="speedNeedle"></div>
            <div class="gauge-center">
                <div class="gauge-value" id="speedValue">0</div>
                <div class="gauge-unit">km/h</div>
                <div class="gauge-label">SPEED</div>
            </div>
        </div>
    </div>

    <div class="hud rpm-gauge">
        <div class="gauge">
            <div class="gauge-arc"></div>
            <div class="gauge-needle" id="rpmNeedle"></div>
            <div class="gauge-center">
                <div class="gauge-value" id="rpmValue">0.8</div>
                <div class="gauge-label" style="margin-top:35px">x1000 RPM</div>
            </div>
        </div>
    </div>

    <div class="hud gear-display">
        <div class="gear-label">GEAR</div>
        <div class="gear-value" id="gearValue">N</div>
    </div>

    <div class="hud steering-wheel">
        <div class="wheel" id="steeringWheel">
            <div class="wheel-spoke"></div>
            <div class="wheel-spoke"></div>
            <div class="wheel-spoke"></div>
        </div>
    </div>

    <div class="hud pedals">
        <div class="pedal clutch" id="pedalClutch">C</div>
        <div class="pedal brake" id="pedalBrake">B</div>
        <div class="pedal gas" id="pedalGas">G</div>
    </div>

    <div class="hud shifter">
        <div class="shifter-pattern">
            <div class="gear-slot" data-gear="1">1</div>
            <div class="gear-slot" data-gear="2">2</div>
            <div class="gear-slot" data-gear="3">3</div>
            <div class="gear-slot" data-gear="4">4</div>
            <div class="gear-slot" data-gear="5">5</div>
            <div class="gear-slot" data-gear="6">6</div>
            <div class="gear-slot neutral active" data-gear="0">N</div>
        </div>
    </div>

    <div class="hud minimap">
        <canvas id="minimapCanvas" width="160" height="160"></canvas>
    </div>

    <div class="hud fps-counter" id="fpsCounter">FPS: 0</div>

    <div class="hud controls-info">
        <span>W/S</span> Gas/Brake &nbsp;|&nbsp; <span>A/D</span> Steer<br>
        <span>Q</span> Clutch &nbsp;|&nbsp; <span>1-6</span> Gear<br>
        <span>N</span> Neutral &nbsp;|&nbsp; <span>R</span> Reverse
    </div>

    <div class="hud engine-vibe">
        <div class="engine-vibe-fill" id="engineVibe"></div>
    </div>

    <div class="hud shift-light" id="shiftLight">SHIFT UP!</div>

    <div class="hud position-display" id="positionDisplay">0.0 km</div>

    <div class="start-screen" id="startScreen">
        <h1>ALIZA RACING 3D</h1>
        <p>Interior Camera - Manual Transmission</p>
        <button class="start-btn" id="startBtn">START ENGINE</button>
    </div>

    <script>
        // ============ 3D RACING ENGINE ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');
        const mirrorLeftCanvas = document.getElementById('mirrorLeftCanvas');
        const mirrorLeftCtx = mirrorLeftCanvas.getContext('2d');
        const mirrorRightCanvas = document.getElementById('mirrorRightCanvas');
        const mirrorRightCtx = mirrorRightCanvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const W = canvas.width;
        const H = canvas.height;

        // Oyun durumu
        const game = {
            running: false,
            lastTime: 0,
            fps: 0,
            frameCount: 0,
            lastFpsTime: 0,
            cameraOffset: 0
        };

        // Araba
        const car = {
            x: 0,
            speed: 0,
            maxSpeed: 280,
            acceleration: 0,
            rpm: 800,
            gear: 0,
            steering: 0,
            steeringAngle: 0,
            clutch: false,
            distance: 0,
            lateralOffset: 0
        };

        const gearRatios = {
            '-1': -3.5, '0': 0,
            '1': 3.8, '2': 2.2, '3': 1.5,
            '4': 1.1, '5': 0.85, '6': 0.68
        };

        // 3D Yol sistemi
        const road = {
            width: 2000,
            segmentLength: 100,
            drawDistance: 300,
            segments: [],
            totalLength: 50000
        };

        // Giriş
        const keys = {};

        // Yol oluştur - gerçekçi virajlar
        function generateRoad() {
            road.segments = [];
            let currentCurve = 0;
            let currentY = 0;

            for (let i = 0; i < 2000; i++) {
                // Viraj pattern'ları
                if (i % 300 === 0) {
                    currentCurve = (Math.random() - 0.5) * 6;
                }
                if (i % 150 === 0 && Math.random() > 0.5) {
                    currentCurve *= -0.5;
                }

                // Yokuş
                if (i % 400 === 0) {
                    currentY = (Math.random() - 0.5) * 200;
                }

                // Yumuşak geçişler
                const prevCurve = i > 0 ? road.segments[i-1].curve : 0;
                currentCurve = prevCurve + (currentCurve - prevCurve) * 0.1;

                road.segments.push({
                    index: i,
                    curve: currentCurve,
                    y: currentY + Math.sin(i * 0.05) * 30,
                    color: Math.floor(i / 3) % 2 === 0 ? '#2a2a2a' : '#323232'
                });
            }
        }

        function project(p, cameraX, cameraY, cameraZ, cameraDepth, width, height, roadWidth) {
            const scale = cameraDepth / (cameraDepth + p.z - cameraZ);
            const screenX = Math.round((width / 2) + (scale * (p.x - cameraX) * width / 2));
            const screenY = Math.round((height / 2) - (scale * (p.y - cameraY) * height / 2));
            const screenW = Math.round(scale * roadWidth * width / 2);
            return { x: screenX, y: screenY, w: screenW, scale: scale };
        }

        function render() {
            // Gökyüzü
            const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.42);
            skyGrad.addColorStop(0, '#0a0a1a');
            skyGrad.addColorStop(0.5, '#1a1a3a');
            skyGrad.addColorStop(1, '#2a2a4a');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, H);

            // Yıldızlar
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 150; i++) {
                const sx = (i * 137.5 + car.distance * 0.005) % W;
                const sy = (i * 73.3 + Math.sin(i) * 50) % (H * 0.35);
                const brightness = 0.3 + Math.sin(i * 0.5 + car.distance * 0.001) * 0.7;
                ctx.globalAlpha = brightness;
                ctx.fillRect(sx, sy, 1.5, 1.5);
            }
            ctx.globalAlpha = 1;

            // Ay
            ctx.fillStyle = '#ffffdd';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ffffdd';
            ctx.beginPath();
            ctx.arc(W * 0.8, H * 0.15, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Dağlar (ufuk çizgisi)
            const horizonY = H * 0.42;
            ctx.fillStyle = '#0f0f1a';
            ctx.beginPath();
            ctx.moveTo(0, horizonY);
            for (let x = 0; x <= W; x += 10) {
                const mountainHeight = Math.sin(x * 0.003) * 40 + 
                                      Math.sin(x * 0.007) * 25 + 
                                      Math.sin(x * 0.015) * 10;
                ctx.lineTo(x, horizonY - 30 - mountainHeight);
            }
            ctx.lineTo(W, horizonY);
            ctx.lineTo(0, horizonY);
            ctx.fill();

            // Yol render - 3D perspektif
            const baseSegment = Math.floor(car.distance / road.segmentLength);
            const basePercent = (car.distance % road.segmentLength) / road.segmentLength;

            const cameraHeight = 1200;
            const cameraDepth = 0.8;
            const cameraZ = car.distance;

            let maxY = H;

            // Yol segmentlerini geriden öne çiz
            for (let n = road.drawDistance; n > 0; n--) {
                const segIndex = (baseSegment + n) % road.segments.length;
                const segment = road.segments[segIndex];
                if (!segment) continue;

                const z = n * road.segmentLength;
                const scale = cameraDepth / (cameraDepth + z);

                // Viraj etkisi
                const curveOffset = segment.curve * n * n * 2;

                // Yol projeksiyonu
                const roadW = road.width * scale * W / 2000;
                const screenX = W / 2 + curveOffset - car.lateralOffset * scale * 0.5;
                const screenY = horizonY + (cameraHeight * scale * H / 1000);

                // Bir sonraki segment
                const nextSegIndex = (baseSegment + n + 1) % road.segments.length;
                const nextSegment = road.segments[nextSegIndex];
                const nextZ = (n + 1) * road.segmentLength;
                const nextScale = cameraDepth / (cameraDepth + nextZ);
                const nextCurveOffset = nextSegment ? nextSegment.curve * (n+1) * (n+1) * 2 : curveOffset;
                const nextRoadW = road.width * nextScale * W / 2000;
                const nextScreenX = W / 2 + nextCurveOffset - car.lateralOffset * nextScale * 0.5;
                const nextScreenY = horizonY + (cameraHeight * nextScale * H / 1000);

                if (screenY >= maxY) continue;
                maxY = screenY;

                // Yol yüzeyi
                ctx.fillStyle = segment.color;
                ctx.beginPath();
                ctx.moveTo(screenX - roadW, screenY);
                ctx.lineTo(screenX + roadW, screenY);
                ctx.lineTo(nextScreenX + nextRoadW, nextScreenY);
                ctx.lineTo(nextScreenX - nextRoadW, nextScreenY);
                ctx.closePath();
                ctx.fill();

                // Şerit çizgileri
                if (n % 4 === 0) {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    const lineW = 6 * scale;
                    ctx.fillRect(screenX - lineW/2, screenY, lineW, nextScreenY - screenY);
                }

                // Orta şerit (çift yol)
                if (n % 8 === 0) {
                    ctx.fillStyle = 'rgba(255,255,200,0.4)';
                    const midW = 4 * scale;
                    ctx.fillRect(screenX - midW/2, screenY, midW, nextScreenY - screenY);
                }

                // Kenar çizgileri
                ctx.fillStyle = '#cc3333';
                const edgeW = 12 * scale;
                ctx.fillRect(screenX - roadW - edgeW, screenY, edgeW, nextScreenY - screenY);
                ctx.fillRect(screenX + roadW, screenY, edgeW, nextScreenY - screenY);

                // Çimenlikler
                ctx.fillStyle = n % 2 === 0 ? '#1a3a1a' : '#1d3d1d';
                ctx.fillRect(0, screenY, screenX - roadW - edgeW, nextScreenY - screenY);
                ctx.fillRect(screenX + roadW + edgeW, screenY, W - (screenX + roadW + edgeW), nextScreenY - screenY);

                // Ağaçlar (belirli aralıklarla)
                if (n % 15 === 0 && n > 10) {
                    drawTree(screenX - roadW - edgeW - 30 * scale, screenY, scale);
                    drawTree(screenX + roadW + edgeW + 30 * scale, screenY, scale);
                }
            }

            // Ön cam çerçevesi (iç kamera hissi)
            ctx.strokeStyle = 'rgba(15,15,15,0.95)';
            ctx.lineWidth = 50;
            ctx.strokeRect(-25, -25, W + 50, H + 50);

            // Cam yansıması (hafif)
            ctx.fillStyle = 'rgba(100,150,255,0.02)';
            ctx.fillRect(0, 0, W, H * 0.5);
        }

        function drawTree(x, y, scale) {
            const treeH = 80 * scale;
            const treeW = 30 * scale;

            // Gövde
            ctx.fillStyle = '#4a3728';
            ctx.fillRect(x - treeW * 0.15, y - treeH * 0.3, treeW * 0.3, treeH * 0.3);

            // Yapraklar
            ctx.fillStyle = '#1a5a1a';
            ctx.beginPath();
            ctx.moveTo(x, y - treeH);
            ctx.lineTo(x - treeW, y - treeH * 0.3);
            ctx.lineTo(x + treeW, y - treeH * 0.3);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#1d6a1d';
            ctx.beginPath();
            ctx.moveTo(x, y - treeH * 0.8);
            ctx.lineTo(x - treeW * 0.8, y - treeH * 0.2);
            ctx.lineTo(x + treeW * 0.8, y - treeH * 0.2);
            ctx.closePath();
            ctx.fill();
        }

        function renderMinimap() {
            const mw = minimapCanvas.width;
            const mh = minimapCanvas.height;

            minimapCtx.fillStyle = 'rgba(0,0,0,0.7)';
            minimapCtx.fillRect(0, 0, mw, mh);

            const startSeg = Math.floor(car.distance / road.segmentLength);
            const cx = mw / 2;
            const cy = mh - 20;

            // Yol çizimi
            minimapCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            minimapCtx.lineWidth = 2;
            minimapCtx.beginPath();

            let px = cx, py = cy;
            minimapCtx.moveTo(px, py);

            for (let i = 0; i < 80; i++) {
                const segIdx = (startSeg + i) % road.segments.length;
                const seg = road.segments[segIdx];
                if (!seg) continue;

                px += seg.curve * 2;
                py -= 2;
                minimapCtx.lineTo(px, py);
            }
            minimapCtx.stroke();

            // Araba
            minimapCtx.fillStyle = '#0f0';
            minimapCtx.beginPath();
            minimapCtx.arc(cx + car.lateralOffset * 0.05, cy - 5, 3, 0, Math.PI * 2);
            minimapCtx.fill();

            // Yön oku
            minimapCtx.strokeStyle = '#0f0';
            minimapCtx.lineWidth = 1;
            minimapCtx.beginPath();
            minimapCtx.moveTo(cx + car.lateralOffset * 0.05, cy - 5);
            minimapCtx.lineTo(cx + car.lateralOffset * 0.05 + car.steering * 5, cy - 12);
            minimapCtx.stroke();
        }

        function renderMirrors() {
            // Sol ayna
            mirrorLeftCtx.fillStyle = '#0a0a15';
            mirrorLeftCtx.fillRect(0, 0, 120, 70);

            mirrorLeftCtx.fillStyle = 'rgba(255,255,255,0.1)';
            mirrorLeftCtx.fillRect(10, 30, 100, 2);
            mirrorLeftCtx.fillStyle = '#ff3333';
            mirrorLeftCtx.fillRect(10, 30, 20, 2);

            // Sağ ayna
            mirrorRightCtx.fillStyle = '#0a0a15';
            mirrorRightCtx.fillRect(0, 0, 120, 70);

            mirrorRightCtx.fillStyle = 'rgba(255,255,255,0.1)';
            mirrorRightCtx.fillRect(10, 30, 100, 2);
            mirrorRightCtx.fillStyle = '#ff3333';
            mirrorRightCtx.fillRect(90, 30, 20, 2);
        }

        // Fizik
        function updatePhysics(dt) {
            car.clutch = keys['q'];

            // Direksiyon
            const steerSpeed = 2.5;
            if (keys['a']) car.steering = Math.max(car.steering - steerSpeed * dt, -1);
            else if (keys['d']) car.steering = Math.min(car.steering + steerSpeed * dt, 1);
            else car.steering *= 0.92;

            car.steeringAngle = car.steering * 45;

            // Gaz/fren
            const gearRatio = gearRatios[car.gear] || 0;

            if (keys['w'] && !car.clutch && car.gear !== 0) {
                car.acceleration = 60 * Math.abs(gearRatio);
                car.rpm = Math.min(car.rpm + 350 * dt, 8000);
            } else if (keys['s']) {
                car.acceleration = -100;
                car.rpm = Math.max(car.rpm - 250 * dt, 800);
            } else {
                car.acceleration = -12;
                car.rpm = Math.max(car.rpm - 120 * dt, 800);
            }

            // Boşta/debriyaj RPM
            if (car.gear === 0 || car.clutch) {
                if (keys['w']) car.rpm = Math.min(car.rpm + 400 * dt, 8000);
                else car.rpm = Math.max(car.rpm - 180 * dt, 800);
            } else {
                const targetRpm = Math.abs(car.speed) * 80 * Math.abs(gearRatio) + 800;
                if (!keys['w'] && !keys['s']) {
                    car.rpm += (targetRpm - car.rpm) * 0.08;
                }
            }

            // Hız
            car.speed += car.acceleration * dt;
            car.speed = Math.max(-30, Math.min(car.speed, car.maxSpeed));

            // İlerleme
            car.distance += car.speed * dt * 0.27778;
            if (car.distance < 0) car.distance = 0;

            // Yanal hareket (direksiyon + hız)
            const currentSeg = road.segments[Math.floor(car.distance / road.segmentLength) % road.segments.length];
            const curveForce = currentSeg ? currentSeg.curve * car.speed * 0.008 : 0;

            car.lateralOffset += (car.steering * car.speed * 0.015 - curveForce) * dt * 60;

            // Yol sınırları
            const roadLimit = road.width / 2 - 300;
            if (car.lateralOffset > roadLimit) {
                car.lateralOffset = roadLimit;
                car.speed *= 0.95;
            }
            if (car.lateralOffset < -roadLimit) {
                car.lateralOffset = -roadLimit;
                car.speed *= 0.95;
            }
        }

        // HUD
        function updateHUD() {
            const speedAngle = -135 + (Math.abs(car.speed) / car.maxSpeed) * 270;
            document.getElementById('speedNeedle').style.transform = `translateX(-50%) rotate(${speedAngle}deg)`;
            document.getElementById('speedValue').textContent = Math.floor(Math.abs(car.speed));

            const rpmRatio = Math.min(car.rpm / 8000, 1);
            const rpmAngle = -135 + rpmRatio * 270;
            document.getElementById('rpmNeedle').style.transform = `translateX(-50%) rotate(${rpmAngle}deg)`;
            document.getElementById('rpmValue').textContent = (car.rpm / 1000).toFixed(1);

            document.getElementById('steeringWheel').style.transform = `rotate(${car.steeringAngle * 2.2}deg)`;

            document.getElementById('pedalGas').classList.toggle('active', keys['w']);
            document.getElementById('pedalBrake').classList.toggle('active', keys['s']);
            document.getElementById('pedalClutch').classList.toggle('active', keys['q']);

            document.getElementById('engineVibe').style.width = (car.rpm / 8000 * 100) + '%';

            const shiftLight = document.getElementById('shiftLight');
            if (car.rpm > 6500 && car.gear > 0 && car.gear < 6) {
                shiftLight.classList.add('show');
            } else {
                shiftLight.classList.remove('show');
            }

            document.getElementById('positionDisplay').textContent = (car.distance / 1000).toFixed(1) + ' km';
        }

        function updateGearDisplay() {
            const gearValue = document.getElementById('gearValue');
            const slots = document.querySelectorAll('.gear-slot');

            gearValue.classList.add('shift');
            setTimeout(() => gearValue.classList.remove('shift'), 150);

            gearValue.textContent = car.gear === 0 ? 'N' : car.gear === -1 ? 'R' : car.gear;

            slots.forEach(slot => {
                slot.classList.remove('active');
                if (parseInt(slot.dataset.gear) === car.gear) {
                    slot.classList.add('active');
                }
            });
        }

        // Giriş
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;

            if (e.key >= '1' && e.key <= '6') {
                const newGear = parseInt(e.key);
                if (car.clutch || Math.abs(car.speed) < 5) {
                    car.gear = newGear;
                    updateGearDisplay();
                }
            }
            if (e.key.toLowerCase() === 'n') {
                if (car.clutch || Math.abs(car.speed) < 5) {
                    car.gear = 0;
                    updateGearDisplay();
                }
            }
            if (e.key.toLowerCase() === 'r') {
                if (car.clutch || Math.abs(car.speed) < 5) {
                    car.gear = -1;
                    updateGearDisplay();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Ana döngü
        function gameLoop(timestamp) {
            if (!game.running) return;

            const dt = Math.min((timestamp - game.lastTime) / 1000, 0.05);
            game.lastTime = timestamp;

            game.frameCount++;
            if (timestamp - game.lastFpsTime >= 1000) {
                game.fps = game.frameCount;
                game.frameCount = 0;
                game.lastFpsTime = timestamp;
                document.getElementById('fpsCounter').textContent = 'FPS: ' + game.fps;
            }

            updatePhysics(dt);
            render();
            renderMinimap();
            renderMirrors();
            updateHUD();

            requestAnimationFrame(gameLoop);
        }

        // Başlat
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startScreen').style.display = 'none';
            }, 500);

            generateRoad();
            game.running = true;
            game.lastTime = performance.now();
            game.lastFpsTime = performance.now();
            requestAnimationFrame(gameLoop);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
