<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliza - Hill Climb Racing Tarzı</title>
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div id="top-bar">
                <div id="coin-display">🪙 <span id="coin-count">0</span></div>
                <div id="distance-display">📏 <span id="distance">0</span>m</div>
                <div id="fuel-display">⛽ <span id="fuel">100</span>%</div>
            </div>

            <div id="controls">
                <div id="left-controls">
                    <button id="gas-btn" class="control-btn">🚀 GAZ</button>
                    <button id="brake-btn" class="control-btn">🛑 FREN</button>
                </div>

                <div id="right-controls">
                    <div id="gear-display">Vites: <span id="current-gear">1</span></div>
                    <button id="gear-up-btn" class="control-btn gear-btn">⬆️ Vites Yükselt</button>
                    <button id="gear-down-btn" class="control-btn gear-btn">⬇️ Vites Düşür</button>
                    <div id="clutch-display">Debriyaj: <span id="clutch-status">Bırakıldı</span></div>
                    <button id="clutch-btn" class="control-btn">🔧 Debriyaj</button>
                </div>
            </div>
        </div>

        <!-- Ana Menü -->
        <div id="main-menu" class="screen">
            <h1>🏎️ ALIZA</h1>
            <h2>Hill Climb Racing</h2>
            <div class="menu-buttons">
                <button id="play-btn" class="menu-btn">🎮 Oyna</button>
                <button id="garage-btn" class="menu-btn">🔧 Garaj</button>
                <button id="maps-btn" class="menu-btn">🗺️ Haritalar</button>
                <button id="settings-btn" class="menu-btn">⚙️ Ayarlar</button>
            </div>
            <div id="menu-coins">🪙 <span id="menu-coin-count">0</span></div>
        </div>

        <!-- Garaj -->
        <div id="garage-screen" class="screen hidden">
            <h2>🔧 Garaj</h2>
            <div id="car-list"></div>
            <button id="back-from-garage" class="menu-btn">⬅️ Geri</button>
        </div>

        <!-- Haritalar -->
        <div id="maps-screen" class="screen hidden">
            <h2>🗺️ Haritalar</h2>
            <div id="map-list"></div>
            <button id="back-from-maps" class="menu-btn">⬅️ Geri</button>
        </div>

        <!-- Ayarlar -->
        <div id="settings-screen" class="screen hidden">
            <h2>⚙️ Ayarlar</h2>
            <div class="settings-content">
                <label>Ses: <input type="range" id="volume" min="0" max="100" value="50"></label>
                <label>Müzik: <input type="checkbox" id="music-toggle" checked></label>
                <label>Zorluk: 
                    <select id="difficulty">
                        <option value="easy">Kolay</option>
                        <option value="normal" selected>Normal</option>
                        <option value="hard">Zor</option>
                    </select>
                </label>
            </div>
            <button id="back-from-settings" class="menu-btn">⬅️ Geri</button>
        </div>

        <!-- Oyun Sonu -->
        <div id="game-over" class="screen hidden">
            <h2>🏁 Oyun Bitti!</h2>
            <div id="game-over-stats">
                <p>Mesafe: <span id="final-distance">0</span>m</p>
                <p>Toplanan Altın: <span id="final-coins">0</span></p>
                <p>Ödül: <span id="bonus-coins">0</span> 🪙</p>
            </div>
            <button id="restart-btn" class="menu-btn">🔄 Tekrar Oyna</button>
            <button id="menu-btn" class="menu-btn">🏠 Ana Menü</button>
        </div>

        <!-- Mesafe Ödülü -->
        <div id="milestone-popup" class="popup hidden">
            <h3>🎉 Tebrikler!</h3>
            <p><span id="milestone-distance">100</span>m geçtin!</p>
            <p>Ödül: <span id="milestone-reward">50</span> 🪙</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
