<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Uygulaması</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 Öğrenci Paneli</h1>
</header>

<nav>
    <button onclick="showSection('yks')">YKS Sayaç</button>
    <button onclick="showSection('deneme')">Denemeler</button>
    <button onclick="showSection('program')">Ders Programı</button>
    <button onclick="showSection('notlar')">Notlar</button>
</nav>

<main>

<section id="yks" class="active">
    <h2>🎯 YKS Sayaç</h2>
    <p id="countdown"></p>
</section>

<section id="deneme">
    <h2>📝 Deneme Takibi</h2>
    <input type="text" id="denemeInput" placeholder="Net gir (örn: 80)">
    <button onclick="addDeneme()">Ekle</button>
    <ul id="denemeList"></ul>
</section>

<section id="program">
    <h2>📅 Ders Programı</h2>
    <textarea id="programInput" placeholder="Ders programını yaz..."></textarea>
    <button onclick="saveProgram()">Kaydet</button>
</section>

<section id="notlar">
    <h2>📊 Not Ortalaması</h2>
    <input type="number" id="notInput" placeholder="Not gir">
    <button onclick="addNot()">Ekle</button>
    <p id="ortalama">Ortalama: 0</p>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
