<!-- index.html -->
<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Sürüş</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="ui">
    <div class="card">Hız: <span id="speed">0</span> km/sa</div>
    <div class="card">Vites: <span id="gear">N</span></div>
    <div class="card">FPS: <span id="fps">0</span></div>
    <button id="camBtn">Kamera (C)</button>
  </div>

  <div id="start">
    <h1>Neon Sürüş</h1>
    <p>W/S: Gaz-Fren, A/D: Direksiyon, Shift: Nitro, C: Kamera</p>
    <button id="startBtn">Başlat</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
