<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Araba Simülatörü</title>
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div class="speedometer">
                <div class="gauge-bg"></div>
                <div class="gauge-needle" id="needle"></div>
                <div class="speed-value" id="speedDisplay">0</div>
                <div class="speed-unit">km/h</div>
            </div>

            <div class="gear-display">
                <div class="gear-label">VİTES</div>
                <div class="gear-value" id="gearDisplay">N</div>
            </div>

            <div class="rpm-display">
                <div class="rpm-bar-container">
                    <div class="rpm-bar" id="rpmBar"></div>
                </div>
                <div class="rpm-label">RPM</div>
            </div>

            <div class="controls-hint">
                <div class="hint-item"><span class="key">W</span> Gaz</div>
                <div class="hint-item"><span class="key">S</span> Fren</div>
                <div class="hint-item"><span class="key">A</span> Sol</div>
                <div class="hint-item"><span class="key">D</span> Sağ</div>
                <div class="hint-item"><span class="key">Q</span> Vites Yükselt</div>
                <div class="hint-item"><span class="key">E</span> Vites Düşür</div>
                <div class="hint-item"><span class="key">Space</span> El Freni</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
